<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>e-Food</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>Welcome to e-Food</h1>
    <p>Delicious meals delivered to your door!</p>
  </header>

  <section class="hero">
    <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092" alt="Food Banner">
  </section>

  <section class="menu">
    <h2>Featured Menu</h2>
    <div class="cards">
      <div class="card">
        <img src="https://source.unsplash.com/200x150/?pizza" alt="Pizza">
        <h3>Pizza</h3>
        <p>Cheesy and tasty – $10</p>
      </div>
      <div class="card">
        <img src="https://source.unsplash.com/200x150/?burger" alt="Burger">
        <h3>Burger</h3>
        <p>Juicy and loaded – $8</p>
      </div>
      <div class="card">
        <img src="https://source.unsplash.com/200x150/?sushi" alt="Sushi">
        <h3>Sushi</h3>
        <p>Fresh and healthy – $12</p>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2025 e-Food. All rights reserved.</p>
  </footer>
</body>
</html>
